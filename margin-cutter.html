<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Margin Cutter — Discount Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --navy: #0F2438;
    --navy-2: #16324D;
    --orange: #E86A2E;
    --orange-2: #FF8A3D;
    --paper: #F3EFE7;
    --line: #D8CFBE;
    --ink: #1A1E22;
    --green: #2F7D5C;
    --red: #B23A2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(15,36,56,0.035) 0px, rgba(15,36,56,0.035) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(90deg, rgba(15,36,56,0.035) 0px, rgba(15,36,56,0.035) 1px, transparent 1px, transparent 32px);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    min-height:100vh;
    padding: 18px 14px 60px;
  }
  .wrap{ max-width: 900px; margin: 0 auto; }

  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom: 3px solid var(--navy);
    padding-bottom: 14px; margin-bottom: 18px;
    flex-wrap: wrap; gap:10px;
  }
  .brand-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--orange); font-weight:700; margin-bottom:4px;
  }
  h1{
    font-family:'Archivo Black', sans-serif;
    font-size: clamp(24px, 6vw, 34px);
    margin:0; color: var(--navy); line-height: 1;
    text-transform: uppercase; letter-spacing: -0.01em;
  }
  .sub{ font-size:13px; color:#5B5346; max-width:340px; }

  .toolbar{
    display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;
    align-items:center; justify-content:space-between;
  }
  .add-btn{
    background: var(--navy); color: var(--paper); border:none;
    font-family:'Archivo', sans-serif; font-weight:700; font-size:14px;
    padding: 11px 18px; cursor:pointer; letter-spacing:0.02em;
    display:flex; align-items:center; gap:8px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .add-btn:hover{ background: var(--navy-2); }
  .add-btn:active{ transform: scale(0.97); }
  .add-btn svg{ width:16px; height:16px; }

  .target-field{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--navy);
  }
  .target-field input{
    width: 64px; text-align:center; font-family:'JetBrains Mono', monospace;
    font-size:15px; font-weight:700; border: 2px solid var(--navy);
    background:#fff; padding:7px 4px; color: var(--navy);
  }
  .target-field select{
    font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700;
    border: 2px solid var(--navy); background:#fff; padding:7px 6px; color: var(--navy);
  }
  .target-field input:focus{ outline: 2px solid var(--orange); outline-offset:1px; }

  .cards{ display:flex; flex-direction:column; gap:12px; }

  .card{
    background:#fff;
    border: 1.5px solid var(--line);
    border-left: 5px solid var(--navy);
    padding: 14px 16px;
    position:relative;
  }
  .card.is-good{ border-left-color: var(--green); }
  .card.is-bad{ border-left-color: var(--red); }

  .card-top{
    display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px;
  }
  .item-num{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:#9A8F78;
    letter-spacing:0.08em;
  }
  .item-name{
    flex:1;
    font-family:'Archivo', sans-serif; font-weight:700; font-size:15px;
    border:none; border-bottom: 1.5px dashed var(--line); background:transparent;
    padding: 4px 2px; color: var(--navy); min-width: 0;
  }
  .item-name:focus{ outline:none; border-bottom-color: var(--orange); }
  .remove-btn{
    background:none; border:none; color:#B7AB92; cursor:pointer;
    font-size:18px; line-height:1; padding:2px 6px;
  }
  .remove-btn:hover{ color: var(--red); }

  .inputs-row{
    display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:12px;
  }
  .field label{
    display:block; font-family:'JetBrains Mono', monospace; font-size:10px;
    text-transform:uppercase; letter-spacing:0.08em; color:#8A8064; margin-bottom:4px;
  }
  .field-label-row{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;
    flex-wrap: wrap; gap: 4px;
  }
  .field-label-row label{ margin-bottom:0; }
  .mode-toggle{
    background:none; border:none; cursor:pointer; padding:0;
    font-family:'JetBrains Mono', monospace; font-size:9.5px; text-transform:uppercase;
    letter-spacing:0.04em; color: var(--orange); text-decoration: underline;
    text-underline-offset: 2px;
  }
  .mode-toggle:hover{ color: var(--red); }
  .field .input-affix{
    display:flex; align-items:center; border: 1.5px solid var(--line);
    background: var(--paper);
  }
  .field .input-affix span{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:#8A8064; padding: 0 8px;
  }
  .field input{
    border:none; background:transparent; width:100%; padding: 9px 4px;
    font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:700; color:var(--ink);
    min-width:0;
  }
  .field input:focus{ outline:none; }
  .field .input-affix:focus-within{ border-color: var(--orange); }
  .exvat-note{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:#8A8064;
    margin-top:4px; padding-left:2px;
  }

  .result{
    background: var(--navy); color: var(--paper);
    padding: 20px 22px;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    flex-wrap:wrap;
  }
  .result-main{ display:flex; align-items:baseline; gap:12px; }
  .result-label{
    font-family:'JetBrains Mono', monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:0.08em; color: rgba(243,239,231,0.6);
  }
  .result-discount{
    font-family:'Archivo Black', sans-serif; font-size: 44px; color: var(--orange-2);
    line-height:1;
  }
  .result-detail{
    font-family:'JetBrains Mono', monospace; font-size:12px; color: rgba(243,239,231,0.85);
    text-align:right;
  }
  .buffer-tag{
    display:inline-block; color: var(--orange-2); font-size:10.5px; margin-left:4px;
  }
  .flag{
    font-family:'JetBrains Mono', monospace; font-size:11px;
    background: var(--red); color:#fff; padding: 3px 8px; margin-top:6px;
    display:inline-block;
  }
  .round-note{
    font-family:'JetBrains Mono', monospace; font-size:11.5px; color: var(--navy);
    background: #FCEFE3; border: 1.5px solid var(--orange);
    padding: 8px 12px; margin-top: 8px;
  }
  .round-note b{ color: var(--red); }

  .try-field{
    margin-top: 12px; padding-top: 12px; border-top: 1.5px dashed var(--line);
  }
  .try-field label{
    display:block; font-family:'JetBrains Mono', monospace; font-size:10px;
    text-transform:uppercase; letter-spacing:0.08em; color:#8A8064; margin-bottom:4px;
  }
  .try-field .input-affix{
    display:flex; align-items:center; border: 1.5px solid var(--orange);
    background: #fff; max-width: 220px;
  }
  .try-field .input-affix input{
    border:none; background:transparent; width:100%; padding: 9px 4px;
    font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:700; color:var(--ink);
    min-width:0;
  }
  .try-field .input-affix input:focus{ outline:none; }
  .try-field .input-affix span{
    font-family:'JetBrains Mono', monospace; font-size:12px; color:#8A8064; padding: 0 8px;
  }
  .try-result{
    margin-top: 10px; background: var(--orange); color: #fff; padding: 12px 14px;
  }
  .try-result .result-label{ color: rgba(255,255,255,0.8); }
  .try-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:6px;
  }
  .try-label{
    display:block; font-family:'JetBrains Mono', monospace; font-size:9.5px;
    text-transform:uppercase; letter-spacing:0.08em; color: rgba(255,255,255,0.75);
  }
  .try-val{
    display:block; font-family:'Archivo Black', sans-serif; font-size:20px; color:#fff; line-height:1.3;
  }
  .try-val.try-warn{ color: var(--navy); }
  .try-sub{
    display:block; font-family:'JetBrains Mono', monospace; font-size:11px; color: rgba(255,255,255,0.75);
  }

  .empty{
    text-align:center; padding: 50px 20px; color:#9A8F78;
    font-family:'JetBrains Mono', monospace; font-size:13px;
    border: 1.5px dashed var(--line);
  }

  footer{
    margin-top:22px; padding-top:14px; border-top: 1.5px solid var(--line);
    font-family:'JetBrains Mono', monospace; font-size:11px; color:#9A8F78;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
  }

  @media (max-width:420px){
    .inputs-row{ grid-template-columns: 1fr 1fr; }
    .result{ flex-direction:column; align-items:flex-start; }
    .result-detail{ text-align:left; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eyebrow">Trade Counter // Margin Tool</div>
      <h1>Margin Cutter</h1>
      <div class="sub">Screen-shop a supplier order, punch in the price &amp; margin shown, get the discount to hit your target.</div>
    </div>
  </header>

  <div class="toolbar">
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      Add line
    </button>
    <div class="target-field">
      <label for="globalTarget">Target margin →</label>
      <input type="text" inputmode="decimal" id="globalTarget" value="30"> %
    </div>
    <div class="target-field">
      <label for="vatRate">VAT rate →</label>
      <input type="text" inputmode="decimal" id="vatRate" value="20"> %
    </div>
    <div class="target-field">
      <label for="roundStep">Order system rounds to →</label>
      <select id="roundStep">
        <option value="0">Exact (no rounding)</option>
        <option value="1" selected>Nearest whole %</option>
        <option value="0.5">Nearest 0.5%</option>
      </select>
    </div>
    <div class="target-field">
      <label for="safetyBuffer">Safety buffer →</label>
      <input type="text" inputmode="decimal" id="safetyBuffer" value="0.5"> %
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <footer>
    <span id="lineCount">0 lines</span>
    <span>Cost = Sell × (1 − margin) · New Sell = Cost ÷ (1 − target)</span>
  </footer>
</div>

<script>
let items = [];
let idCounter = 0;

function addItem(prefill){
  idCounter++;
  items.push(Object.assign({
    id: idCounter,
    name: 'Item ' + idCounter,
    price: '',
    margin: '',
    costPrice: '',
    mode: 'margin', // 'margin' or 'cost'
    tryDiscount: '',
  }, prefill || {}));
  render();
}

function removeItem(id){
  items = items.filter(i => i.id !== id);
  render();
}

function updateItem(id, field, value){
  const item = items.find(i => i.id === id);
  if(item) item[field] = value;
  render();
}

function fmt(n, dp){
  if(!isFinite(n)) return '—';
  const d = dp === undefined ? 2 : dp;
  return n.toLocaleString('en-GB', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function calc(price, margin, target, vat, roundStep, mode, costPrice, tryDiscount, buffer){
  const p = parseFloat(price);
  const t = parseFloat(target);
  const v = parseFloat(vat);
  const rs = parseFloat(roundStep);
  const buf = parseFloat(buffer);
  if(!isFinite(p) || !isFinite(t) || p <= 0){
    return null;
  }

  let cost, m;
  if(mode === 'cost'){
    cost = parseFloat(costPrice);
    if(!isFinite(cost) || cost <= 0) return null;
    m = ((p - cost) / p) * 100; // derived margin, for display/consistency checks
  } else {
    m = parseFloat(margin);
    if(!isFinite(m)) return null;
    cost = p * (1 - m/100);
  }

  // Effective target includes a small safety buffer so truncation/rounding on your
  // order system doesn't tip the real margin back under your true target.
  const effectiveTarget = t + (isFinite(buf) ? buf : 0);

  const vatMultiplier = isFinite(v) ? (1 + v/100) : 1;
  const priceExVat = p / vatMultiplier;
  const newSell = cost / (1 - effectiveTarget/100);
  const newSellExVat = newSell / vatMultiplier;
  const discountAmount = p - newSell;
  const discountPct = (discountAmount / p) * 100;
  const newSellMargin = ((newSell - cost) / newSell) * 100; // true margin at the buffered price

  let rounded = null;
  if(isFinite(rs) && rs > 0){
    const roundedDiscountPct = Math.round(discountPct / rs) * rs;
    const roundedSell = p * (1 - roundedDiscountPct/100);
    const roundedMargin = ((roundedSell - cost) / roundedSell) * 100;
    rounded = { discountPct: roundedDiscountPct, sell: roundedSell, margin: roundedMargin };
  }

  let tried = null;
  const td = parseFloat(tryDiscount);
  if(isFinite(td)){
    const triedSell = p * (1 - td/100);
    const triedSellExVat = triedSell / vatMultiplier;
    const triedMargin = ((triedSell - cost) / triedSell) * 100;
    tried = { discountPct: td, sell: triedSell, sellExVat: triedSellExVat, margin: triedMargin };
  }

  return { cost, newSell, newSellExVat, newSellMargin, priceExVat, discountAmount, discountPct, marginTooLow: m <= t, rounded, derivedMargin: m, tried, effectiveTarget };
}

function render(){
  const cardsEl = document.getElementById('cards');
  const target = document.getElementById('globalTarget').value;
  const vat = document.getElementById('vatRate').value;
  const roundStep = document.getElementById('roundStep').value;
  const buffer = document.getElementById('safetyBuffer').value;
  document.getElementById('lineCount').textContent = items.length + (items.length === 1 ? ' line' : ' lines');

  // Remember which field was focused (and cursor position) so we can restore it after rebuilding
  const active = document.activeElement;
  let focusKey = null, focusStart = null, focusEnd = null;
  if(active && active.dataset && active.dataset.key && cardsEl.contains(active)){
    focusKey = active.dataset.key;
    focusStart = active.selectionStart;
    focusEnd = active.selectionEnd;
  }

  if(items.length === 0){
    cardsEl.innerHTML = '<div class="empty">No lines yet. Tap "Add line" to start screen-shopping an order.</div>';
    return;
  }

  cardsEl.innerHTML = items.map((item, idx) => {
    const r = calc(item.price, item.margin, target, vat, roundStep, item.mode, item.costPrice, item.tryDiscount, buffer);
    let cardClass = 'card';
    let resultHtml = '<div class="result"><span class="result-label">Enter price &amp; margin to calculate</span></div>';

    if(r){
      if(r.marginTooLow){
        cardClass += ' is-bad';
        resultHtml = `
          <div class="result">
            <div class="result-main">
              <span class="result-label">Discount</span>
              <span class="result-discount">N/A</span>
            </div>
          </div>
          <span class="flag">Current margin already ≤ target — no discount needed</span>`;
      } else {
        cardClass += ' is-good';
        const bufVal = parseFloat(buffer);
        const bufferNote = (isFinite(bufVal) && bufVal > 0)
          ? ` <span class="buffer-tag">+${fmt(bufVal,1)}% buffer → aiming for ${fmt(r.effectiveTarget,1)}%</span>`
          : '';
        const roundNote = r.rounded ? `
          <div class="round-note">
            Enter <b>${fmt(r.rounded.discountPct,2).replace(/\.?0+$/,'')}%</b> in your order system → actual margin will be <b>${fmt(r.rounded.margin,1)}%</b>${Math.abs(r.rounded.margin - parseFloat(target)) > 0.15 ? ' (target was ' + fmt(parseFloat(target),0) + '%)' : ''}
          </div>` : '';
        resultHtml = `
          <div class="result">
            <div class="result-main">
              <span class="result-label">Discount</span>
              <span class="result-discount">${fmt(r.discountPct,3)}%</span>
            </div>
            <div class="result-detail">
              £${fmt(r.discountAmount)} off · new price £${fmt(r.newSell)}/m² (£${fmt(r.newSellExVat)} ex VAT)<br>
              cost £${fmt(r.cost)}/m² · true margin ${fmt(r.newSellMargin,2)}%${bufferNote}
            </div>
          </div>
          ${roundNote}`;
      }
    }

    let tryHtml = '';
    if(r && r.tried){
      tryHtml = `
        <div class="try-result">
          <span class="result-label">At ${fmt(r.tried.discountPct,2).replace(/\.?0+$/,'')}% discount</span>
          <div class="try-grid">
            <div><span class="try-label">New price</span><span class="try-val">£${fmt(r.tried.sell)}</span><span class="try-sub">£${fmt(r.tried.sellExVat)} ex VAT</span></div>
            <div><span class="try-label">Actual margin</span><span class="try-val ${r.tried.margin < parseFloat(target) - 0.1 ? 'try-warn' : ''}">${fmt(r.tried.margin,2)}%</span></div>
          </div>
        </div>`;
    }

    return `
      <div class="${cardClass}">
        <div class="card-top">
          <span class="item-num">#${String(idx+1).padStart(2,'0')}</span>
          <input class="item-name" data-key="${item.id}-name" value="${item.name.replace(/"/g,'&quot;')}"
            oninput="updateItem(${item.id}, 'name', this.value)">
          <button class="remove-btn" onclick="removeItem(${item.id})" aria-label="Remove line">✕</button>
        </div>
        <div class="inputs-row">
          <div class="field">
            <label>Price /m² (inc VAT)</label>
            <div class="input-affix">
              <span>£</span>
              <input type="text" inputmode="decimal" placeholder="0.00" data-key="${item.id}-price"
                value="${item.price}"
                oninput="updateItem(${item.id}, 'price', this.value)">
            </div>
            ${r ? `<div class="exvat-note">ex VAT: £${fmt(r.priceExVat)}</div>` : ''}
          </div>
          <div class="field">
            <div class="field-label-row">
              <label>${item.mode === 'cost' ? 'Cost price /m²' : 'Current margin'}</label>
              <button type="button" class="mode-toggle" onclick="updateItem(${item.id}, 'mode', '${item.mode === 'cost' ? 'margin' : 'cost'}')">
                use ${item.mode === 'cost' ? 'margin %' : 'cost price'} instead
              </button>
            </div>
            ${item.mode === 'cost' ? `
            <div class="input-affix">
              <span>£</span>
              <input type="text" inputmode="decimal" placeholder="0.00" data-key="${item.id}-costPrice"
                value="${item.costPrice}"
                oninput="updateItem(${item.id}, 'costPrice', this.value)">
            </div>
            ${r ? `<div class="exvat-note">≈ ${fmt(r.derivedMargin,2)}% margin</div>` : ''}
            ` : `
            <div class="input-affix">
              <input type="text" inputmode="decimal" placeholder="0" data-key="${item.id}-margin"
                value="${item.margin}"
                oninput="updateItem(${item.id}, 'margin', this.value)">
              <span>%</span>
            </div>
            `}
          </div>
        </div>
        ${resultHtml}
        <div class="try-field">
          <label>Try a specific discount %</label>
          <div class="input-affix">
            <input type="text" inputmode="decimal" placeholder="e.g. 45.50" data-key="${item.id}-tryDiscount"
              value="${item.tryDiscount}"
              oninput="updateItem(${item.id}, 'tryDiscount', this.value)">
            <span>%</span>
          </div>
        </div>
        ${tryHtml}
      </div>`;
  }).join('');

  // Restore focus + cursor position to whichever field was being typed in
  if(focusKey){
    const el = cardsEl.querySelector(`[data-key="${focusKey}"]`);
    if(el){
      el.focus();
      if(focusStart !== null && el.setSelectionRange){
        try { el.setSelectionRange(focusStart, focusEnd); } catch(e) {}
      }
    }
  }
}

document.getElementById('addBtn').addEventListener('click', () => addItem());
document.getElementById('globalTarget').addEventListener('input', render);
document.getElementById('vatRate').addEventListener('input', render);
document.getElementById('roundStep').addEventListener('change', render);
document.getElementById('safetyBuffer').addEventListener('input', render);

// Seed with the worked example
addItem({ name: 'Carpet A', price: '12.00', margin: '48' });
</script>
</body>
</html>
